<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position fixed</title>
</head>
<style>
    body{
        height: 2000px;
        background-color: aqua;
    }

    .box{
        position: fixed;
        height:300px;
        width: 300px;
        background-color: rgb(52, 173, 147);
        border: 2px solid black;
        right: 10px;
        bottom: 10px;
    }
    .box1{
        position: fixed;
        height:300px;
        width: 300px;
        background-color: rgb(72, 45, 173);
        border: 2px solid black;
        left: 10px;
        bottom: 10px;
    }
</style>
<body>
    <div class="box">

    </div>
    <div class="box1">

    </div>
</body>
</html>
