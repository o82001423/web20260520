<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        position: relative;
        height: 300px;
        width: 300px;
        background-color: aquamarine;
        margin-top: 50px;
        left: 100px;
    }

    .box-pink {
        position: absolute;
        height: 30px;
        width: 30px;
        background-color: pink;
        top: 0;
        right: 0;
    }

    .box-yellow {
        position: absolute;
        height: 30px;
        width: 30px;
        background-color: yellow;
        bottom:0;
        right: 0;
    }
</style>

<body>
    <div class="box">
        <div class="box-pink"></div>
        <div class="box-yellow"></div>
    </div>

    <div class="box">
        <div class="box-pink"></div>
        <div class="box-yellow"></div>
    </div>
    <div class="box">
        <div class="box-pink"></div>
        <div class="box-yellow"></div>
    </div>
    <div class="box">
        <div class="box-pink"></div>
        <div class="box-yellow"></div>
    </div>
</body>

</html>
