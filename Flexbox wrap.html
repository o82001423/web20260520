<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexwrap</title>

</head>
<style>
    .container {
        width: 80%;
        /* height: 700px; */
        background-color: rgb(97, 11, 155);
        margin: auto;

        /* flex */
        display: flex;
        /* 宣告flex */
        justify-content: space-around;
        /* 水平分散 */
        /* justify-content: center; */
        /* 水平置中 */
        align-items: center;
        /* 垂直置中 */
        flex-wrap: wrap;
        
    }

    .item {
        width: 400px;
        height: 300px;
        background-color: rgb(41, 175, 131);
        margin-left: 10px;
        margin-right: 10px;
        margin-top: 50px;
        margin-bottom: 50px;
    }
    .item-h{
        opacity:0.5;
        
    }
</style>

<body>
    <div class="container">
        <div class="item item-h"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item item-h"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item item-h"></div>
    </div>

</body>

</html>
