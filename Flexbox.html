<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
</head>
<style>
    .container {
        width: 80%;
        height: 500px;
        background-color: rgb(97, 11, 155);
        margin: auto;
        
        /* flex */
        display: flex;
        /* 宣告flex */
        justify-content: space-around;
        /* 水平分散 */
        /* justify-content: center; */
        /* 水平置中 */
        align-items: center;
        /* 垂直置中 */
    }

    .item {
        height: 300px;
        width: 300px;
        background-color: rgb(41, 175, 131);
        border: 5px solid brown;
    }
</style>

<body>
    <div class="container">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>

</body>

</html>
